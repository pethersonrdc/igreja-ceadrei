{% extends "base.html" %}

{% block title %}Evento Batismo — Acesso{% endblock %}

{% block content %}
<section class="page-hero">
  <p class="eyebrow">Área restrita</p>
  <h1>Evangelista Sueli é a Responsável pelo evento dúvida entre em contato.</h1>
  <p>Acesso da responsável pelo Evento Batismo.</p>
</section>

<section class="section arraial-login-layout">
  <form class="admin-card" method="post" action="{{ url_for('batismo_login', next=request.args.get('next', '')) }}">
    <label for="senha">Senha de acesso</label>
    <input id="senha" name="senha" type="password" required autofocus placeholder="Digite a senha">
    {% if erro %}
    <p class="admin-msg admin-msg--erro">{{ erro }}</p>
    {% endif %}
    <button class="btn btn-primary" type="submit">Entrar</button>
  </form>

  <figure class="arraial-lider-foto">
    <img src="{{ url_for('static', filename='images/batismo/sueli.png') }}" alt="Evangelista Sueli">
    <figcaption>Evangelista Sueli</figcaption>
  </figure>
</section>
{% endblock %}
