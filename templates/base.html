<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ igreja.nome }}{% endblock %}</title>
  <meta name="description" content="{{ igreja.lema }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('home') }}">{{ igreja.nome }}</a>
    <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false">
      <span></span><span></span>
    </button>
    <nav class="site-nav" aria-label="Principal">
      <a href="{{ url_for('home') }}">Início</a>
      <a href="{{ url_for('sobre') }}">Sobre</a>
      <a href="{{ url_for('cultos_page') }}">Cultos</a>
      <a href="{{ url_for('eventos_page') }}">Eventos</a>
      <a href="{{ url_for('contato') }}">Contato</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">{{ igreja.nome }}</p>
      <p class="footer-lema">{{ igreja.lema }}</p>
      <p class="footer-copy">&copy; 2026 {{ igreja.nome }}. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
